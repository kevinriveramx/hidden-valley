<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIH | Make It Happen</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7f5;
      color: #1f2937;
    }

    .hero {
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .hero .subtitle {
      font-size: 1.3rem;
      margin-bottom: 10px;
      opacity: 0.95;
    }

    .hero .description {
      max-width: 700px;
      margin: 0 auto;
      opacity: 0.85;
      line-height: 1.6;
    }

    .button-container {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      background: white;
      color: #111827;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .presentation {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .presentation iframe {
      width: 100%;
      height: 85vh;
      min-height: 650px;
      border: none;
      border-radius: 12px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
    }

    @media (max-width: 768px) {
      .hero {
        padding: 40px 20px;
      }

      .hero h1 {
        font-size: 2.5rem;
      }

      .hero .subtitle {
        font-size: 1.1rem;
      }

      .btn {
        width: 100%;
        max-width: 320px;
      }

      .presentation {
        padding: 10px;
      }

      .presentation iframe {
        height: 75vh;
        min-height: 500px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">

    <h1>MIH</h1>

    <p class="subtitle">
      Make It Happen
    </p>

    <p class="description">
      Marketing Growth Blueprint & Customer Acquisition Strategy
    </p>

    <div class="button-container">
      <a
        class="btn"
        href="https://gamma.app/embed/6ckd00d8xao8lm1"
        target="_blank">
        Open Full Presentation
      </a>
    </div>

  </section>

  <section class="presentation">
    <iframe
      src="https://gamma.app/embed/6ckd00d8xao8lm1"
      allow="fullscreen"
      title="MIH Presentation">
    </iframe>
  </section>

</body>
</html>
