<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hidden Valley Tree Service | Marketing Growth Blueprint</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7f5;
      color: #1f2937;
    }

    .hero {
      background: linear-gradient(135deg, #2f7d4a, #245f39);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 15px;
    }

    .hero p {
      font-size: clamp(1rem, 2vw, 1.25rem);
      opacity: 0.95;
      max-width: 700px;
      margin: 0 auto;
    }

    .button-container {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      background: white;
      color: #2f7d4a;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .presentation {
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .presentation iframe {
      width: 100%;
      height: 85vh;
      min-height: 600px;
      border: none;
      border-radius: 12px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
    }

    @media (max-width: 768px) {
      .hero {
        padding: 40px 20px;
      }

      .presentation {
        padding: 10px;
      }

      .presentation iframe {
        height: 75vh;
        min-height: 500px;
        border-radius: 8px;
      }

      .btn {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1>Hidden Valley Tree Service</h1>

    <p>
      Marketing Growth Blueprint & Customer Acquisition Strategy
    </p>

    <div class="button-container">
      <a
        class="btn"
        href="https://gamma.app/embed/6ckd00d8xao8lm1"
        target="_blank">
        Open Full Presentation
      </a>
    </div>
  </section>

  <section class="presentation">
    <iframe
      src="https://gamma.app/embed/6ckd00d8xao8lm1"
      allow="fullscreen"
      title="Hidden Valley Presentation">
    </iframe>
  </section>

</body>
</html>
